<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.pagetitle | default: page.title | default: site.title }}</title>

  <!-- Google Tag Manager -->
  <script>
    (function (w, d, s, l, i) {
      w[l] = w[l] || [];
      w[l].push({ "gtm.start": new Date().getTime(), event: "gtm.js" });
      var f = d.getElementsByTagName(s)[0],
        j = d.createElement(s),
        dl = l != "dataLayer" ? "&l=" + l : "";
      j.async = true;
      j.src = "https://www.googletagmanager.com/gtm.js?id=" + i + dl;
      f.parentNode.insertBefore(j, f);
    })(window, document, "script", "dataLayer", "GTM-5B8VD5SK");
  </script>
  <!-- End Google Tag Manager -->

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-PMMY7LYYMC"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag("js", new Date());
    gtag("config", "G-PMMY7LYYMC");
  </script>

  <!-- Metadata -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Willard Robinson",
    "alternateName": ["WR", "Will Robinson"],
    "url": "https://wmrobin.github.io/"
  }
  </script>

  <meta name="description" content="Will Robinson is a fourth year Ph.D. student in the Economics department at North Carolina State University (NCSU)." />
  <meta name="keywords" content="North Carolina State University, Environmental Economics, cap and trade, national parks" />
  <meta name="author" content="Willard Robinson" />
  <meta property="og:site_name" content="Willard Robinson" />

  <link rel="shortcut icon" href="/images/icons/ncstate-circle-reyred-kowolf.svg" />
  <link rel="icon" href="/images/icons/ncstate-circle-reyred-kowolf.svg" />

  <!-- Bootstrap 5 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />

  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

  <!-- Google Fonts: Source Sans 3 -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet" />

  <!-- Custom styles -->
  <link rel="stylesheet" href="/assets/css/style.css" />
</head>
<body>

<!-- Google Tag Manager (noscript) -->
<noscript>
  <iframe src="https://www.googletagmanager.com/ns.html?id=GTM-5B8VD5SK"
    height="0" width="0" style="display:none;visibility:hidden"></iframe>
</noscript>
<!-- End Google Tag Manager (noscript) -->

<nav class="navbar navbar-expand-md navbar-dark px-3" style="background-color: #CC0000;">
  <a class="navbar-brand fw-semibold" href="/">Willard Robinson</a>
  <button class="navbar-toggler" type="button"
    data-bs-toggle="collapse" data-bs-target="#navbarContent"
    aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation">
    <span class="navbar-toggler-icon"></span>
  </button>

  <div class="collapse navbar-collapse" id="navbarContent">
    <ul class="navbar-nav me-auto mb-2 mb-md-0">
      {% for item in site.nav_left %}
      <li class="nav-item">
        <a class="nav-link" href="{{ item.href }}">
          <i class="fa-solid {{ item.icon }}"></i> {{ item.text }}
        </a>
      </li>
      {% endfor %}
    </ul>
    <ul class="navbar-nav ms-auto mb-2 mb-md-0">
      {% for item in site.nav_right %}
      <li class="nav-item">
        <a class="nav-link" href="{{ item.href }}" target="_blank" rel="noopener">
          <i class="{{ item.icon }}"></i>
        </a>
      </li>
      {% endfor %}
    </ul>
  </div>
</nav>

<main class="container py-4 section">
  {{ content }}
</main>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

{% if page.mathjax %}
<!-- MathJax -->
<script>
  MathJax = {
    tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
    svg: { fontCache: 'global' }
  };
</script>
<script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
{% endif %}

</body>
</html>
